name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I asked Claude to list my Desktop files, it said it didn't have access instead of calling list_directory.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Claude should have called list_directory directly without asking me to grant folder access.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Cowork session
        2. Ask: "What files are in my Desktop?"
        3. Claude responds with folder-picker instead of tool call
    validations:
      required: true

  - type: dropdown
    id: tool
    attributes:
      label: Which tool was involved?
      options:
        - run_command
        - read_file
        - list_directory
        - find_files
        - search_file
        - get_system_info
        - run_git_command
        - run_npm_command
        - Not tool-specific / install issue
        - Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin version
      description: Check setup.ps1 header or package.json for the version number.
      placeholder: v1.3.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: Windows 11 Pro 24H2
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant lines from `logs/service-err.log` or `logs/audit.log` in your install directory.
      render: text
